services:
  community-backend:
    image: ghcr.io/dreamnext-af-home/community-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    mem_limit: 512m
    environment:
      NODE_OPTIONS: "--max-old-space-size=384"
      PORT: "4000"
      DATABASE_URL: "${COMMUNITY_DATABASE_URL:-}"
      DATABASE_SCHEMA: community
      REDIS_HOST: "${REDIS_HOST:-redis}"
      REDIS_PORT: "6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
      CORS_ORIGINS: "${CORS_ORIGINS:-https://afhome.ph,https://community.afhome.ph}"
      CLOUDINARY_CLOUD_NAME: "${CLOUDINARY_CLOUD_NAME:-}"
      CLOUDINARY_API_KEY: "${CLOUDINARY_API_KEY:-}"
      CLOUDINARY_API_SECRET: "${CLOUDINARY_API_SECRET:-}"
      CLOUDINARY_COMMUNITY_POSTS_FOLDER: afhome/community/posts
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.community-backend.rule=Host(`community-backend.afhome.ph`)"
      - "traefik.http.routers.community-backend.entrypoints=websecure"
      - "traefik.http.routers.community-backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.community-backend.loadbalancer.server.port=4000"
    networks:
      - dokploy-network

  community-frontend:
    # NEXT_PUBLIC_* values are baked into this image at BUILD time in CI.
    image: ghcr.io/dreamnext-af-home/community-frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    mem_limit: 768m
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      NODE_OPTIONS: "--max-old-space-size=512"
      NEXT_PUBLIC_AFHOME_API_URL: "${NEXT_PUBLIC_AFHOME_API_URL:-https://backend.afhome.ph}"
      NEXT_PUBLIC_COMMUNITY_API_URL: "${NEXT_PUBLIC_COMMUNITY_API_URL:-https://community-backend.afhome.ph}"
      NEXT_PUBLIC_REALTIME_URL: "${NEXT_PUBLIC_REALTIME_URL:-https://realtime.afhome.ph}"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.community-frontend.rule=Host(`community.afhome.ph`)"
      - "traefik.http.routers.community-frontend.entrypoints=websecure"
      - "traefik.http.routers.community-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.community-frontend.loadbalancer.server.port=3000"
      - "traefik.http.routers.community-frontend.priority=10000"
      - "traefik.http.routers.community-frontend-legacy.rule=(Host(`afhome.ph`) || Host(`www.afhome.ph`)) && PathPrefix(`/community`)"
      - "traefik.http.routers.community-frontend-legacy.entrypoints=websecure"
      - "traefik.http.routers.community-frontend-legacy.tls.certresolver=letsencrypt"
      - "traefik.http.routers.community-frontend-legacy.priority=10000"
      - "traefik.http.routers.community-frontend-legacy.middlewares=community-frontend-redirect"
      - "traefik.http.routers.community-frontend-legacy.service=community-frontend"
      - "traefik.http.middlewares.community-frontend-redirect.redirectregex.regex=^https?://(?:www\\.)?afhome\\.ph/community(?:/(.*))?$"
      - "traefik.http.middlewares.community-frontend-redirect.redirectregex.replacement=https://community.afhome.ph/$${1}"
      - "traefik.http.middlewares.community-frontend-redirect.redirectregex.permanent=true"
    networks:
      - dokploy-network

  realtime-service:
    image: ghcr.io/dreamnext-af-home/realtime-service:${IMAGE_TAG:-latest}
    restart: unless-stopped
    mem_limit: 384m
    environment:
      NODE_OPTIONS: "--max-old-space-size=256"
      PORT: "4001"
      REDIS_HOST: "${REDIS_HOST:-redis}"
      REDIS_PORT: "6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
      CORS_ORIGINS: "${CORS_ORIGINS:-https://afhome.ph,https://community.afhome.ph}"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.realtime-service.rule=Host(`realtime.afhome.ph`)"
      - "traefik.http.routers.realtime-service.entrypoints=websecure"
      - "traefik.http.routers.realtime-service.tls.certresolver=letsencrypt"
      - "traefik.http.services.realtime-service.loadbalancer.server.port=4001"
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
