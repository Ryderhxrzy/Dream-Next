  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: "AF HOME ENV URL"
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    env:
      DOKPLOY_WEBHOOK_URL_MAIN: ${{ secrets.DOKPLOY_WEBHOOK_URL_MAIN || vars.DOKPLOY_WEBHOOK_URL_MAIN }}
      DOKPLOY_WEBHOOK_URL_COMMUNITY: ${{ secrets.DOKPLOY_WEBHOOK_URL_COMMUNITY || vars.DOKPLOY_WEBHOOK_URL_COMMUNITY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect deploy targets
        uses: dorny/paths-filter@v3
        id: deploy_changed
        with:
          filters: |
            main_stack:
              - 'apps/apsara-home-frontend/**'
              - 'apps/apsara-home-backend/**'
              - 'apps/Dreambuild-Landing-Page/**'
              - 'docker-compose.prod.yml'
            community_stack:
              - 'apps/community-frontend/**'
              - 'apps/community-backend/**'
              - 'apps/realtime-service/**'
              - 'docker-compose.community.prod.yml'
            shared_deploy:
              - 'docker/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'package.json'
              - '.github/workflows/build-push.yml'

      - name: Show deploy target decision
        run: |
          echo "main_stack=${{ steps.deploy_changed.outputs.main_stack }}"
          echo "community_stack=${{ steps.deploy_changed.outputs.community_stack }}"
          echo "shared_deploy=${{ steps.deploy_changed.outputs.shared_deploy }}"
          echo "branch=${GITHUB_REF_NAME}"
          echo "has_main_webhook=${{ env.DOKPLOY_WEBHOOK_URL_MAIN != '' }}"
          echo "has_community_webhook=${{ env.DOKPLOY_WEBHOOK_URL_COMMUNITY != '' }}"

      - name: Trigger Dokploy redeploy (main stack)
        if: ${{ env.DOKPLOY_WEBHOOK_URL_MAIN != '' && github.ref == 'refs/heads/main' && (github.event_name == 'workflow_dispatch' || steps.deploy_changed.outputs.main_stack == 'true' || steps.deploy_changed.outputs.shared_deploy == 'true') }}
        run: |
          curl -L --fail-with-body -sS -w '\nHTTP_STATUS:%{http_code}\n' -X POST \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: push" \
            -d "{\"ref\":\"refs/heads/main\",\"repository\":{\"full_name\":\"${GITHUB_REPOSITORY}\"},\"head_commit\":{\"id\":\"${GITHUB_SHA}\",\"message\":\"${GITHUB_REF_NAME}\"}}" \
            "$DOKPLOY_WEBHOOK_URL_MAIN"

      - name: Trigger Dokploy redeploy (community stack)
        if: ${{ env.DOKPLOY_WEBHOOK_URL_COMMUNITY != '' && github.ref == 'refs/heads/main' && (github.event_name == 'workflow_dispatch' || steps.deploy_changed.outputs.community_stack == 'true' || steps.deploy_changed.outputs.shared_deploy == 'true') }}
        run: |
          curl -L --fail-with-body -sS -w '\nHTTP_STATUS:%{http_code}\n' -X POST \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: push" \
            -d "{\"ref\":\"refs/heads/main\",\"repository\":{\"full_name\":\"${GITHUB_REPOSITORY}\"},\"head_commit\":{\"id\":\"${GITHUB_SHA}\",\"message\":\"${GITHUB_REF_NAME}\"}}" \
            "$DOKPLOY_WEBHOOK_URL_COMMUNITY"