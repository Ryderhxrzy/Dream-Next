services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.prod.Dockerfile
    restart: unless-stopped
    environment:
      APP_NAME: "${APP_NAME:-AF Home}"
      APP_ENV: production
      APP_KEY: "${APP_KEY:-}"
      APP_DEBUG: "false"
      APP_URL: "${APP_URL:-}"
      FRONTEND_URL: "${FRONTEND_URL:-}"
      DB_CONNECTION: "${DB_CONNECTION:-sqlite}"
      DB_HOST: "${DB_HOST:-}"
      DB_PORT: "${DB_PORT:-}"
      DB_DATABASE: "${DB_DATABASE:-}"
      DB_USERNAME: "${DB_USERNAME:-}"
      DB_PASSWORD: "${DB_PASSWORD:-}"
      SESSION_DRIVER: "${SESSION_DRIVER:-database}"
      QUEUE_CONNECTION: "${QUEUE_CONNECTION:-database}"
      CACHE_STORE: "${CACHE_STORE:-database}"
      BROADCAST_CONNECTION: "${BROADCAST_CONNECTION:-log}"
      FILESYSTEM_DISK: "${FILESYSTEM_DISK:-local}"
      REDIS_CLIENT: predis
      REDIS_HOST: redis
      REDIS_PASSWORD: "${REDIS_PASSWORD:-local_redis_password}"
      REDIS_PORT: 6379
      REDIS_DB: "${REDIS_DB:-0}"
      REDIS_CACHE_DB: "${REDIS_CACHE_DB:-1}"
      MAIL_MAILER: "${MAIL_MAILER:-log}"
      RESEND_API_KEY: "${RESEND_API_KEY:-}"
      MAIL_HOST: "${MAIL_HOST:-}"
      MAIL_PORT: "${MAIL_PORT:-}"
      MAIL_USERNAME: "${MAIL_USERNAME:-}"
      MAIL_PASSWORD: "${MAIL_PASSWORD:-}"
      MAIL_SCHEME: "${MAIL_SCHEME:-}"
      MAIL_FROM_ADDRESS: "${MAIL_FROM_ADDRESS:-hello@example.com}"
      MAIL_FROM_NAME: "${MAIL_FROM_NAME:-AF Home}"
      PUSHER_APP_ID: "${PUSHER_APP_ID:-}"
      PUSHER_APP_KEY: "${PUSHER_APP_KEY:-}"
      PUSHER_APP_SECRET: "${PUSHER_APP_SECRET:-}"
      PUSHER_APP_CLUSTER: "${PUSHER_APP_CLUSTER:-ap1}"
      PUSHER_APP_TLS: "${PUSHER_APP_TLS:-true}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      CLOUDINARY_CLOUD_NAME: "${CLOUDINARY_CLOUD_NAME:-}"
      CLOUDINARY_API_KEY: "${CLOUDINARY_API_KEY:-}"
      CLOUDINARY_API_SECRET: "${CLOUDINARY_API_SECRET:-}"
      PAYMONGO_SECRET_KEY: "${PAYMONGO_SECRET_KEY:-}"
      PAYMONGO_WEBHOOK_SECRET: "${PAYMONGO_WEBHOOK_SECRET:-}"
      PAYMONGO_LIVE_SECRET_KEY: "${PAYMONGO_LIVE_SECRET_KEY:-}"
      PAYMONGO_LIVE_PUBLIC_KEY: "${PAYMONGO_LIVE_PUBLIC_KEY:-}"
      PAYMONGO_LIVE_WEBHOOK_SECRET: "${PAYMONGO_LIVE_WEBHOOK_SECRET:-}"
      SEMAPHORE_API_KEY: "${SEMAPHORE_API_KEY:-}"
      MEILI_HOST: "${MEILI_HOST:-}"
      MEILI_MASTER_KEY: "${MEILI_MASTER_KEY:-}"
      MEILI_SEARCH_KEY: "${MEILI_SEARCH_KEY:-}"
      ZQ_API_BASE_URL: "${ZQ_API_BASE_URL:-}"
      ZQ_API_KEY: "${ZQ_API_KEY:-}"
      ZQ_TIMEOUT: "${ZQ_TIMEOUT:-30}"
      XDE_BASE_URL: "${XDE_BASE_URL:-}"
      XDE_BOOK_PATH: "${XDE_BOOK_PATH:-}"
      XDE_TRACK_PATH: "${XDE_TRACK_PATH:-}"
      XDE_API_KEY: "${XDE_API_KEY:-}"
      XDE_TOKEN: "${XDE_TOKEN:-}"
      XDE_TIMEOUT: "${XDE_TIMEOUT:-20}"
      XDE_DEFAULT_WEIGHT: "${XDE_DEFAULT_WEIGHT:-1}"
      XDE_DEFAULT_LENGTH: "${XDE_DEFAULT_LENGTH:-10}"
      XDE_DEFAULT_WIDTH: "${XDE_DEFAULT_WIDTH:-10}"
      XDE_DEFAULT_HEIGHT: "${XDE_DEFAULT_HEIGHT:-10}"
      XDE_DEFAULT_VOLUME: "${XDE_DEFAULT_VOLUME:-1}"
      XDE_PACKAGE_SIZE: "${XDE_PACKAGE_SIZE:-}"
      XDE_PACKAGE_TYPE: "${XDE_PACKAGE_TYPE:-}"
      XDE_DELIVERY_TYPE: "${XDE_DELIVERY_TYPE:-}"
      XDE_SHIPPING_TYPE: "${XDE_SHIPPING_TYPE:-}"
      XDE_JOURNEY_TYPE: "${XDE_JOURNEY_TYPE:-}"
      XDE_TRANSPORT_MODE: "${XDE_TRANSPORT_MODE:-}"
      XDE_PORT_CODE: "${XDE_PORT_CODE:-}"
      XDE_SHIPMENT_PROVIDER: "${XDE_SHIPMENT_PROVIDER:-}"
      XDE_MERCHANT_NAME: "${XDE_MERCHANT_NAME:-}"
      XDE_MERCHANT_ADDRESS: "${XDE_MERCHANT_ADDRESS:-}"
      XDE_MERCHANT_MOBILE: "${XDE_MERCHANT_MOBILE:-}"
      XDE_MERCHANT_EMAIL: "${XDE_MERCHANT_EMAIL:-}"
      XDE_MERCHANT_PROVINCE: "${XDE_MERCHANT_PROVINCE:-}"
      XDE_MERCHANT_CITY: "${XDE_MERCHANT_CITY:-}"
      JT_API_BASE_URL: "${JT_API_BASE_URL:-}"
      JT_CUSTOMER_CODE: "${JT_CUSTOMER_CODE:-}"
      JT_API_ACCOUNT: "${JT_API_ACCOUNT:-}"
      JT_API_PASSWORD: "${JT_API_PASSWORD:-}"
      JT_PRIVATE_KEY: "${JT_PRIVATE_KEY:-}"
      JT_IS_SANDBOX: "${JT_IS_SANDBOX:-true}"
      JNT_BASE_URL: "${JNT_BASE_URL:-}"
      JNT_BOOK_PATH: "${JNT_BOOK_PATH:-}"
      JNT_TRACK_PATH: "${JNT_TRACK_PATH:-}"
      JNT_CUSTOMER_CODE: "${JNT_CUSTOMER_CODE:-}"
      JNT_API_ACCOUNT: "${JNT_API_ACCOUNT:-}"
      JNT_PASSWORD: "${JNT_PASSWORD:-}"
      JNT_PRIVATE_KEY: "${JNT_PRIVATE_KEY:-}"
      JNT_IS_SANDBOX: "${JNT_IS_SANDBOX:-true}"
      JNT_PASSWORD_SUFFIX: "${JNT_PASSWORD_SUFFIX:-}"
      JNT_SERVICE_TYPE: "${JNT_SERVICE_TYPE:-}"
      JNT_COUNTRY_CODE: "${JNT_COUNTRY_CODE:-}"
      JNT_ORDER_TYPE: "${JNT_ORDER_TYPE:-}"
      JNT_EXPRESS_TYPE: "${JNT_EXPRESS_TYPE:-}"
      JNT_DELIVERY_TYPE: "${JNT_DELIVERY_TYPE:-}"
      JNT_GOODS_TYPE: "${JNT_GOODS_TYPE:-}"
      JNT_PRICE_CURRENCY: "${JNT_PRICE_CURRENCY:-}"
      JNT_OPERATE_TYPE: "${JNT_OPERATE_TYPE:-}"
      JNT_DEFAULT_WEIGHT: "${JNT_DEFAULT_WEIGHT:-1}"
      JNT_DEFAULT_LENGTH: "${JNT_DEFAULT_LENGTH:-10}"
      JNT_DEFAULT_WIDTH: "${JNT_DEFAULT_WIDTH:-10}"
      JNT_DEFAULT_HEIGHT: "${JNT_DEFAULT_HEIGHT:-10}"
      JNT_DEFAULT_VOLUME: "${JNT_DEFAULT_VOLUME:-1000}"
      JNT_OFFER_FEE: "${JNT_OFFER_FEE:-0}"
      JNT_SENDER_NAME: "${JNT_SENDER_NAME:-}"
      JNT_SENDER_COMPANY: "${JNT_SENDER_COMPANY:-}"
      JNT_SENDER_PHONE: "${JNT_SENDER_PHONE:-}"
      JNT_SENDER_MOBILE: "${JNT_SENDER_MOBILE:-}"
      JNT_SENDER_EMAIL: "${JNT_SENDER_EMAIL:-}"
      JNT_SENDER_POST_CODE: "${JNT_SENDER_POST_CODE:-}"
      JNT_SENDER_PROVINCE: "${JNT_SENDER_PROVINCE:-}"
      JNT_SENDER_CITY: "${JNT_SENDER_CITY:-}"
      JNT_SENDER_ADDRESS: "${JNT_SENDER_ADDRESS:-}"
      JNT_TIMEOUT: "${JNT_TIMEOUT:-20}"
      JNT_WEBHOOK_SECRET: "${JNT_WEBHOOK_SECRET:-}"
      JNT_HEADER_DIGEST_OVERRIDE: "${JNT_HEADER_DIGEST_OVERRIDE:-}"
      USER_LOGIN_CLOUDFLARE_TURNSTILE_SECRET: "${USER_LOGIN_CLOUDFLARE_TURNSTILE_SECRET:-}"
      USER_SIGNUP_CLOUDFLARE_TURNSTILE_SECRET: "${USER_SIGNUP_CLOUDFLARE_TURNSTILE_SECRET:-}"
      ADMIN_LOGIN_CLOUDFLARE_TURNSTILE_SECRET: "${ADMIN_LOGIN_CLOUDFLARE_TURNSTILE_SECRET:-}"
      USER_FORGOT_PASSWORD_CLOUDFLARE_TURNSTILE_SECRET: "${USER_FORGOT_PASSWORD_CLOUDFLARE_TURNSTILE_SECRET:-}"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET:-}"
      GOOGLE_REDIRECT_URL: "${GOOGLE_REDIRECT_URL:-}"
      FACEBOOK_CLIENT_ID: "${FACEBOOK_CLIENT_ID:-}"
      FACEBOOK_CLIENT_SECRET: "${FACEBOOK_CLIENT_SECRET:-}"
      FACEBOOK_REDIRECT_URL: "${FACEBOOK_REDIRECT_URL:-}"
      GOOGLE_DRIVE_FOLDER_ID: "${GOOGLE_DRIVE_FOLDER_ID:-}"
      GOOGLE_DRIVE_FOLDER_URL: "${GOOGLE_DRIVE_FOLDER_URL:-}"
      GOOGLE_DRIVE_SERVICE_ACCOUNT_EMAIL: "${GOOGLE_DRIVE_SERVICE_ACCOUNT_EMAIL:-}"
      GOOGLE_DRIVE_SERVICE_ACCOUNT_PRIVATE_KEY: "${GOOGLE_DRIVE_SERVICE_ACCOUNT_PRIVATE_KEY:-}"
      GOOGLE_DRIVE_DESKTOP_BACKUP_PATH: "${GOOGLE_DRIVE_DESKTOP_BACKUP_PATH:-}"
      DB_DAILY_EXPORT_ENABLED: "${DB_DAILY_EXPORT_ENABLED:-false}"
      GOOGLE_DRIVE_OAUTH_CLIENT_ID: "${GOOGLE_DRIVE_OAUTH_CLIENT_ID:-}"
      GOOGLE_DRIVE_OAUTH_CLIENT_SECRET: "${GOOGLE_DRIVE_OAUTH_CLIENT_SECRET:-}"
      GOOGLE_DRIVE_OAUTH_REFRESH_TOKEN: "${GOOGLE_DRIVE_OAUTH_REFRESH_TOKEN:-}"
      FIREBASE_CREDENTIALS_JSON: "${FIREBASE_CREDENTIALS_JSON:-}"
      FIREBASE_CREDENTIALS_PATH: "${FIREBASE_CREDENTIALS_PATH:-storage/firebase-credentials.json}"
      FIREBASE_PROJECT_ID: "${FIREBASE_PROJECT_ID:-}"
      ONESIGNAL_APP_ID: "${ONESIGNAL_APP_ID:-}"
      ONESIGNAL_REST_API_KEY: "${ONESIGNAL_REST_API_KEY:-}"
      MOBILE_PAYMENT_SUCCESS_URL: "${MOBILE_PAYMENT_SUCCESS_URL:-}"
      MOBILE_PAYMENT_CANCEL_URL: "${MOBILE_PAYMENT_CANCEL_URL:-}"
    depends_on:
      - redis

  frontend:
    build:
      context: .
      dockerfile: docker/next.prod.Dockerfile
      args:
        APP_FILTER: apsara-home-frontend
        NEXTAUTH_URL: "${NEXTAUTH_URL:-}"
        NEXTAUTH_SECRET: "${NEXTAUTH_SECRET:-}"
        NEXT_PUBLIC_LARAVEL_API_URL: "${NEXT_PUBLIC_LARAVEL_API_URL:-}"
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-}"
        NEXT_PUBLIC_BASE_URL: "${NEXT_PUBLIC_BASE_URL:-}"
        NEXT_PUBLIC_SITE_URL: "${NEXT_PUBLIC_SITE_URL:-}"
        NEXT_PUBLIC_APP_URL: "${NEXT_PUBLIC_APP_URL:-}"
        NEXT_PUBLIC_PUSHER_KEY: "${NEXT_PUBLIC_PUSHER_KEY:-}"
        NEXT_PUBLIC_PUSHER_CLUSTER: "${NEXT_PUBLIC_PUSHER_CLUSTER:-ap1}"
        NEXT_PUBLIC_TAWK_PROPERTY_ID: "${NEXT_PUBLIC_TAWK_PROPERTY_ID:-}"
        NEXT_PUBLIC_TAWK_WIDGET_ID: "${NEXT_PUBLIC_TAWK_WIDGET_ID:-}"
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: "${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}"
        USER_LOGIN_CLOUDFLARE_SITE_KEY: "${USER_LOGIN_CLOUDFLARE_SITE_KEY:-}"
        USER_SIGNUP_CLOUDFLARE_SITE_KEY: "${USER_SIGNUP_CLOUDFLARE_SITE_KEY:-}"
        USER_FORGOT_PASSWORD_CLOUDFLARE_SITE_KEY: "${USER_FORGOT_PASSWORD_CLOUDFLARE_SITE_KEY:-}"
        ADMIN_LOGIN_CLOUDFLARE_SITE_KEY: "${ADMIN_LOGIN_CLOUDFLARE_SITE_KEY:-}"
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      NEXTAUTH_URL: "${NEXTAUTH_URL:-}"
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET:-}"
      NEXT_PUBLIC_LARAVEL_API_URL: "${NEXT_PUBLIC_LARAVEL_API_URL:-}"
      NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-}"
      LARAVEL_API_URL: "${LARAVEL_API_URL:-http://backend:8000}"
      NEXT_PUBLIC_BASE_URL: "${NEXT_PUBLIC_BASE_URL:-}"
      NEXT_PUBLIC_SITE_URL: "${NEXT_PUBLIC_SITE_URL:-}"
      NEXT_PUBLIC_APP_URL: "${NEXT_PUBLIC_APP_URL:-}"
      NEXT_PUBLIC_PUSHER_KEY: "${NEXT_PUBLIC_PUSHER_KEY:-}"
      NEXT_PUBLIC_PUSHER_CLUSTER: "${NEXT_PUBLIC_PUSHER_CLUSTER:-ap1}"
      NEXT_PUBLIC_TAWK_PROPERTY_ID: "${NEXT_PUBLIC_TAWK_PROPERTY_ID:-}"
      NEXT_PUBLIC_TAWK_WIDGET_ID: "${NEXT_PUBLIC_TAWK_WIDGET_ID:-}"
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: "${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET:-}"
      WEBAUTHN_ALLOWED_ORIGINS: "${WEBAUTHN_ALLOWED_ORIGINS:-}"
      WEBAUTHN_RP_ID: "${WEBAUTHN_RP_ID:-}"
      WEBAUTHN_RP_NAME: "${WEBAUTHN_RP_NAME:-AF Home}"
      USER_LOGIN_CLOUDFLARE_SITE_KEY: "${USER_LOGIN_CLOUDFLARE_SITE_KEY:-}"
      USER_SIGNUP_CLOUDFLARE_SITE_KEY: "${USER_SIGNUP_CLOUDFLARE_SITE_KEY:-}"
      USER_FORGOT_PASSWORD_CLOUDFLARE_SITE_KEY: "${USER_FORGOT_PASSWORD_CLOUDFLARE_SITE_KEY:-}"
      ADMIN_LOGIN_CLOUDFLARE_SITE_KEY: "${ADMIN_LOGIN_CLOUDFLARE_SITE_KEY:-}"
      CLOUDINARY_CLOUD_NAME: "${CLOUDINARY_CLOUD_NAME:-}"
      CLOUDINARY_API_KEY: "${CLOUDINARY_API_KEY:-}"
      CLOUDINARY_API_SECRET: "${CLOUDINARY_API_SECRET:-}"
      GOOGLE_DRIVE_FOLDER_ID: "${GOOGLE_DRIVE_FOLDER_ID:-}"
      GOOGLE_DRIVE_FOLDER_URL: "${GOOGLE_DRIVE_FOLDER_URL:-}"
      GOOGLE_DRIVE_SERVICE_ACCOUNT_EMAIL: "${GOOGLE_DRIVE_SERVICE_ACCOUNT_EMAIL:-}"
      GOOGLE_DRIVE_SERVICE_ACCOUNT_PRIVATE_KEY: "${GOOGLE_DRIVE_SERVICE_ACCOUNT_PRIVATE_KEY:-}"
      GOOGLE_DRIVE_DESKTOP_BACKUP_PATH: "${GOOGLE_DRIVE_DESKTOP_BACKUP_PATH:-}"
      GOOGLE_DRIVE_OAUTH_CLIENT_ID: "${GOOGLE_DRIVE_OAUTH_CLIENT_ID:-}"
      GOOGLE_DRIVE_OAUTH_CLIENT_SECRET: "${GOOGLE_DRIVE_OAUTH_CLIENT_SECRET:-}"
      GOOGLE_DRIVE_OAUTH_REFRESH_TOKEN: "${GOOGLE_DRIVE_OAUTH_REFRESH_TOKEN:-}"
      GOOGLE_CLIENT_EMAIL: "${GOOGLE_CLIENT_EMAIL:-}"
      GOOGLE_PRIVATE_KEY: "${GOOGLE_PRIVATE_KEY:-}"
    depends_on:
      - backend

  dreambuild:
    build:
      context: .
      dockerfile: docker/next.prod.Dockerfile
      args:
        APP_FILTER: dreambuild
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-}"
        NEXT_PUBLIC_LARAVEL_API_URL: "${NEXT_PUBLIC_LARAVEL_API_URL:-}"
        NEXT_PUBLIC_PUSHER_KEY: "${NEXT_PUBLIC_PUSHER_KEY:-}"
        NEXT_PUBLIC_PUSHER_CLUSTER: "${NEXT_PUBLIC_PUSHER_CLUSTER:-ap1}"
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-}"
      NEXT_PUBLIC_LARAVEL_API_URL: "${NEXT_PUBLIC_LARAVEL_API_URL:-}"
      LARAVEL_API_URL: "${LARAVEL_API_URL:-http://backend:8000}"
      NEXT_PUBLIC_PUSHER_KEY: "${NEXT_PUBLIC_PUSHER_KEY:-}"
      NEXT_PUBLIC_PUSHER_CLUSTER: "${NEXT_PUBLIC_PUSHER_CLUSTER:-ap1}"
    depends_on:
      - backend

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass "${REDIS_PASSWORD:-local_redis_password}" --appendonly yes
    volumes:
      - redis_data:/data

volumes:
  redis_data:
