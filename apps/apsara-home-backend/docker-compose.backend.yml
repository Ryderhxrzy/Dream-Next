services:
  backend:
    build:
      context: ..
      dockerfile: Apsara-Home-Backend/Dockerfile
    container_name: afhome-backend
    restart: unless-stopped
    working_dir: /app
    env_file:
      - ./.env.docker
    ports:
      - "8000:8000"
      - "5173:5173"
    volumes:
      - ./:/app
      - /app/vendor
      - /app/node_modules
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: afhome-redis
    restart: unless-stopped
    command: redis-server --requirepass "local_redis_password" --appendonly yes
    volumes:
      - redis_data:/data

volumes:
  redis_data:
